    line-height: 1.8;

  .item .status { width: 16px; text-align: center; flex-shrink: 0; }
  .item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .size { color: #aaa; flex-shrink: 0; }
  .done { color: #5a8a5a; }
  .err { color: #a05a5a; }
  #summary { margin-top: 20px; font-size: 0.85rem; font-weight: 600; color: #2c2c2c; }

const BASE = "https://images.squarespace-cdn.com/content/v1/65bd460acab3b64f6935e171";

function fmt(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

async function startDownload() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  const summary = document.getElementById('summary');
  log.innerHTML = '';
  summary.textContent = '';

  if (!('showDirectoryPicker' in window)) {
    alert('Your browser does not support the File System Access API. Please use Chrome 86+ or Edge 86+.');
    return;
  }

  let dirHandle;
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch (e) {
    if (e.name !== 'AbortError') alert('Could not open folder: ' + e.message);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Downloading…';

  let done = 0, failed = 0;

  for (const [filename, hash] of IMAGES) {
    const url = `${BASE}/${hash}/${encodeURIComponent(filename).replace(/\(/g,'%28').replace(/\)/g,'%29')}?format=2500w`;
    const row = document.createElement('div');
    row.className = 'item';
    row.innerHTML = `<span class="status">⏳</span><span class="name">${filename}</span><span class="size">…</span>`;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const blob = await res.blob();
      const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      row.querySelector('.status').textContent = '✓';
      row.querySelector('.status').className = 'status done';
      row.querySelector('.size').textContent = fmt(blob.size);
      done++;
    } catch (e) {
      row.querySelector('.status').textContent = '✗';
      row.querySelector('.status').className = 'status err';
      row.querySelector('.size').textContent = e.message;
      failed++;
    }
  }

  btn.disabled = false;
  btn.textContent = 'Download Again';
  summary.textContent = `Complete: ${done} saved, ${failed} failed.`;
}
