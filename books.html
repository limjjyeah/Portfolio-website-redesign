<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Books — Jennifer Merrell">
    <title>books — jennifer merrell</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg: #F5EDE6;
            --ink: #3D3229;
            --subtle: rgba(61,50,41,0.4);
            --ease: 0.45s ease-out;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: var(--bg);
            color: var(--ink);
            font-size: 14pt;
            text-transform: lowercase;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.18;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 180px 180px;
        }

        a { color: inherit; text-decoration: none; }

        /* ── NAV ── */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 300;
            padding: 1.7rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(245, 237, 230, 0.95);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .nav-back {
            font-size: 14pt;
            color: var(--subtle);
            transition: color var(--ease);
        }
        .nav-back:hover { color: var(--ink); }
        .nav-label {
            font-size: 14pt;
            color: var(--subtle);
        }

        /* ── PAGE WRAPPER ── */
        .page {
            padding-top: 8.5rem;
            padding-bottom: 12rem;
        }

        .gallery {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 7vw;
        }

        /* ── GROUP SPACING ── */
        .g-solo,
        .g-pair {
            margin-bottom: 6.5rem;
        }

        /* ── SOLO GROUPS ── */
        .g-solo {
            display: flex;
        }
        .g-solo .iw       { width: 57.5%; }

        .g-solo.pos-a     { padding-left: 21%; }
        .g-solo.pos-b     { padding-left: 21%; }
        .g-solo.pos-c     { padding-left: 16%; }
        .g-solo.pos-d     { padding-left: 23%; }
        .g-solo.pos-e     { padding-left: 12%; }
        .g-solo.pos-f     { padding-left: 28%; }

        /* ── PAIR GROUPS ── */
        .g-pair {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .g-pair .iw-left  { width: 35%; margin-top: 55px; }
        .g-pair .iw-right { width: 50%; }

        .g-pair.alt .iw-left  { margin-top: 0; }
        .g-pair.alt .iw-right { margin-top: 62px; }

        /* ── IMAGE WRAPPER ── */
        .iw {
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.65s ease-out, transform 0.65s ease-out;
        }
        .iw.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .iw img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.25s ease;
        }
        .iw:hover img { opacity: 0.87; }

        /* ── LIGHTBOX ── */
        .lb {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .lb.open { display: flex; }

        .lb-bg {
            position: absolute;
            inset: 0;
            background: rgba(245, 237, 230, 0.97);
            cursor: pointer;
        }

        .lb-shell {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 80vw;
        }

        .lb-img-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lb-img-wrap img {
            display: block;
            max-width: 78vw;
            max-height: 84vh;
            object-fit: contain;
            transition: opacity 0.18s ease;
        }
        .lb-img-wrap img.switching { opacity: 0; }

        .lb-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            background: none;
            border: none;
            cursor: pointer;
            padding: 1.2rem 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lb-arrow svg {
            width: 28px;
            height: 28px;
            stroke: var(--subtle);
            stroke-width: 1;
            fill: none;
            transition: stroke 0.2s;
        }
        .lb-arrow:hover svg { stroke: var(--ink); }
        #lb-prev { left: 2rem; }
        #lb-next { right: 2rem; }

        .lb-close {
            position: fixed;
            top: 1.8rem;
            right: 2.8rem;
            z-index: 2;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 14pt;
            color: var(--subtle);
            transition: color 0.2s;
            text-transform: lowercase;
            letter-spacing: 0.02em;
        }
        .lb-close:hover { color: var(--ink); }

        .lb-counter {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 14pt;
            color: var(--subtle);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        /* ── MOBILE ── */
        @media (max-width: 680px) {
            .nav { padding: 1.2rem 1.4rem; }
            .page { padding-top: 7rem; padding-bottom: 7rem; }
            .gallery { padding: 0 1.2rem; }

            .g-solo,
            .g-pair       { flex-direction: column; gap: 2rem; margin-bottom: 3.5rem; }

            .g-solo       { padding-left: 0 !important; }
            .g-solo .iw   { width: 96% !important; }

            .g-pair .iw-left,
            .g-pair .iw-right { width: 92%; margin-top: 0 !important; }
            .g-pair .iw-right { align-self: flex-end; }

            .lb-img-wrap img { max-width: 82vw; max-height: 72vh; }
            #lb-prev { left: 0.5rem; }
            #lb-next { right: 0.5rem; }
            .lb-arrow { padding: 0.8rem; }
            .lb-arrow svg { width: 22px; height: 22px; }
        }
    </style>
</head>

<!-- ── LIGHTBOX ── -->
<div class="lb" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="lb-bg" id="lb-bg"></div>

    <button class="lb-arrow" id="lb-prev" aria-label="Previous image">
        <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg"><polyline points="17,6 9,14 17,22"/></svg>
    </button>

    <div class="lb-shell">
        <div class="lb-img-wrap">
            <img id="lb-img" src="" alt="books">
        </div>
    </div>

    <button class="lb-arrow" id="lb-next" aria-label="Next image">
        <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg"><polyline points="11,6 19,14 11,22"/></svg>
    </button>

    <button class="lb-close" id="lb-close" aria-label="Close">close</button>
    <div class="lb-counter" id="lb-counter" aria-live="polite"></div>
</div>


<script>
(function () {
    const wrappers = Array.from(document.querySelectorAll('.iw'));
    const total    = wrappers.length;
    let   cur      = 0;

    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lb-img');
    const lbCtr   = document.getElementById('lb-counter');

    function getSrc(idx) {
        return wrappers[idx].querySelector('img').src;
    }

    function setCounter() {
        lbCtr.textContent = (cur + 1) + ' / ' + total;
    }

    function swapImage(newIdx) {
        lbImg.classList.add('switching');
        setTimeout(function () {
            cur = (newIdx + total) % total;
            lbImg.src = getSrc(cur);
            setCounter();
            lbImg.classList.remove('switching');
        }, 170);
    }

    function openLb(idx) {
        cur = idx;
        lbImg.src = getSrc(cur);
        setCounter();
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeLb() {
        lb.classList.remove('open');
        document.body.style.overflow = '';
    }

    wrappers.forEach(function (iw, idx) {
        iw.addEventListener('click', function () { openLb(idx); });
    });

    document.getElementById('lb-bg').addEventListener('click',    closeLb);
    document.getElementById('lb-close').addEventListener('click', closeLb);

    document.getElementById('lb-prev').addEventListener('click', function (e) {
        e.stopPropagation();
        swapImage(cur - 1);
    });
    document.getElementById('lb-next').addEventListener('click', function (e) {
        e.stopPropagation();
        swapImage(cur + 1);
    });

    document.addEventListener('keydown', function (e) {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape')       closeLb();
        if (e.key === 'ArrowLeft')    swapImage(cur - 1);
        if (e.key === 'ArrowRight')   swapImage(cur + 1);
    });

    var touchStartX = 0;
    lb.addEventListener('touchstart', function (e) {
        touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });
    lb.addEventListener('touchend', function (e) {
        var dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 40) {
            dx < 0 ? swapImage(cur + 1) : swapImage(cur - 1);
        }
    }, { passive: true });

    // ── scroll reveal ──
    var revealObs = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
            if (entry.isIntersecting) {
                var siblings = entry.target.closest('.g-pair, .g-solo')
                    ? entry.target.closest('.g-pair, .g-solo').querySelectorAll('.iw')
                    : [];
                var delay = 0;
                siblings.forEach(function (sib, i) {
                    if (sib === entry.target) delay = i * 90;
                });
                setTimeout(function () {
                    entry.target.classList.add('visible');
                }, delay);
                revealObs.unobserve(entry.target);
            }
        });
    }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });

    wrappers.forEach(function (iw) { revealObs.observe(iw); });
}());
</script>
