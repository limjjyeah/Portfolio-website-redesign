document.getElementById('btn').addEventListener('click', async () => {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  const progress = document.getElementById('progress');

  btn.disabled = true;
  log.textContent = '';

  let dirHandle;
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
  } catch (e) {
    log.textContent = 'folder selection cancelled.';
    btn.disabled = false;
    return;
  }

  let ok = 0, fail = 0;
  for (let i = 0; i < IMAGES.length; i++) {
    const { url, name } = IMAGES[i];
    progress.textContent = `downloading ${i + 1} / ${IMAGES.length} — ${name}`;
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const blob = await resp.blob();
      const fileHandle = await dirHandle.getFileHandle(name, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      log.textContent += `✓ ${name}\n`;
      ok++;
    } catch (e) {
      log.textContent += `✗ ${name} — ${e.message}\n`;
      fail++;
    }
    // small pause to avoid rate-limiting
    await new Promise(r => setTimeout(r, 80));
  }

  progress.textContent = `done. ${ok} saved, ${fail} failed.`;
  btn.disabled = false;
});
</script>
